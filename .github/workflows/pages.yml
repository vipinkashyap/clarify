name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "SPEC.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (pandoc + ghostscript)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc ghostscript

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Install Clarify
        run: |
          uv venv
          uv pip install -e .

      - name: Cache parsed papers + figures
        uses: actions/cache@v4
        with:
          path: |
            .cache/parsed
            .cache/figures
            .cache/source
            .cache/clarify.db
          key: clarify-cache-${{ hashFiles('extractions/*.json', 'clarify/parse.py', 'clarify/figures.py', 'clarify/render.py') }}
          restore-keys: |
            clarify-cache-

      - name: Bootstrap (fetch + ingest every paper in extractions/)
        run: uv run clarify bootstrap

      - name: Regenerate coverage snapshot
        run: uv run clarify stats --markdown > docs/coverage.md

      - name: Refresh arxiv Discover snapshot
        run: uv run clarify discover
        continue-on-error: true   # arxiv rate-limits happen; don't fail the deploy


      - name: Build static site
        run: uv run clarify build-static dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
